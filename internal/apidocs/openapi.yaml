openapi: 3.0.3
info:
  title: cliostore API
  description: |
    HTTP-API von **cliostore** â€” einem in Go geschriebenen Event Store.
    Events werden im CloudEvents-Format geschrieben, gelesen und live beobachtet.

    Event-Listen werden als **NDJSON** geliefert (ein JSON-Objekt pro Zeile),
    Content-Type `application/x-ndjson`.

    Alle Datenrouten sind per **Bearer-Token** geschĂĽtzt (`Authorize`-Button).
  version: "1.0"
  # x-audience nach Swiss API Guidelines: die API-Spec ist Ă¶ffentlich
  # dokumentiert und fĂĽr jeden nutzbar, der eine clio-Instanz betreibt.
  x-audience: external-public
  contact:
    name: cliostore
    url: https://github.com/pblumer/clio
  license:
    name: MIT
    url: https://github.com/pblumer/clio/blob/main/LICENSE

servers:
  - url: /
    description: Diese Instanz

security:
  - bearerAuth: []

tags:
  - name: System
  - name: Events
  - name: Dev

paths:
  /api/v1/ping:
    get:
      tags: [System]
      summary: ErreichbarkeitsprĂĽfung (Liveness)
      security: []
      responses:
        "200":
          description: Server erreichbar
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Status" }
    post:
      tags: [System]
      summary: ErreichbarkeitsprĂĽfung (Liveness)
      security: []
      responses:
        "200":
          description: Server erreichbar
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Status" }

  /api/v1/write-events:
    post:
      tags: [Events]
      summary: Ein oder mehrere Events atomar schreiben
      description: |
        Schreibt alle Event-Candidates in einer einzigen Transaktion
        (alles-oder-nichts). `id`, `time` und `specversion` werden serverseitig
        ergĂ¤nzt. Optionale Preconditions ermĂ¶glichen Optimistic Concurrency.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WriteEventsRequest" }
            examples:
              einfach:
                value:
                  events:
                    - source: "https://library.example.io"
                      subject: "/books/42"
                      type: "io.example.library.book-acquired"
                      data: { title: "Dune", author: "Herbert" }
              mitPrecondition:
                value:
                  events:
                    - source: "https://library.example.io"
                      subject: "/books/42"
                      type: "io.example.library.book-borrowed"
                  preconditions:
                    - type: "isSubjectOnEventId"
                      payload: { subject: "/books/42", eventId: "7" }
      responses:
        "200":
          description: Geschriebene Events als NDJSON
          content:
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/EventStream" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: Eine Precondition war nicht erfĂĽllt (Optimistic Concurrency)
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/read-events:
    post:
      tags: [Events]
      summary: Events eines Subjects lesen
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReadEventsRequest" }
            examples:
              subjekt:
                value: { subject: "/books/42" }
              rekursivMitTypen:
                value: { subject: "/books", recursive: true, types: ["acquired"] }
              bereich:
                value: { subject: "/books/42", lowerBound: "2", upperBound: "10" }
      responses:
        "200":
          description: Passende Events als NDJSON
          content:
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/EventStream" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/observe-events:
    post:
      tags: [Events]
      summary: Events beobachten (History + Live-Stream)
      description: |
        Liefert zuerst die passende History und hĂ¤lt die Verbindung dann offen,
        um neue Events live nachzuliefern. Reconnect erfolgt ĂĽber `lowerBound`.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ObserveEventsRequest" }
            examples:
              live:
                value: { subject: "/books", recursive: true }
              reconnect:
                value: { subject: "/books", recursive: true, lowerBound: "42" }
      responses:
        "200":
          description: NDJSON-Stream (offen gehalten)
          content:
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/EventStream" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /metrics:
    get:
      tags: [System]
      summary: Prometheus-Metriken
      security: []
      responses:
        "200":
          description: Metriken im Prometheus-Textformat
          content:
            text/plain:
              schema: { type: string }

  /api/v1/read-subjects:
    get:
      tags: [Events]
      summary: Alle bisher beschriebenen Subjects (Streams) auflisten
      description: |
        NDJSON, ein `{subject,count}`-Objekt pro Zeile (alphabetisch). Der
        optionale Query-Parameter `prefix` schrĂ¤nkt auf den rekursiven Scope
        eines Pfads ein (z. B. `?prefix=/books` liefert `/books` und alles
        darunter; Prefix-Geschwister wie `/booksstore` werden ausgeschlossen).

        Mit `tree=true` wird stattdessen ein **hierarchischer Baum** als
        einzelnes JSON-Objekt zurĂĽckgegeben (`application/json`): jeder Knoten
        trĂ¤gt `count` (Events exakt auf diesem Subject) und `total` (aggregiert
        im Teilbaum). `prefix` setzt dann die Baum-Wurzel.
      parameters:
        - name: prefix
          in: query
          required: false
          schema: { type: string, example: "/books" }
          description: Subject-Pfad (beginnt mit "/"); leer = alle Subjects
        - name: tree
          in: query
          required: false
          schema: { type: string, enum: ["true"] }
          description: "`true` liefert einen verschachtelten Baum statt NDJSON"
      responses:
        "200":
          description: |
            Subjects als NDJSON ({subject,count}) â€” oder, bei `tree=true`, ein
            verschachtelter Baum als JSON-Objekt.
          content:
            application/x-ndjson:
              schema:
                type: string
                description: NDJSON von SubjectInfo-Objekten ({subject,count})
            application/json:
              schema: { $ref: "#/components/schemas/SubjectTreeNode" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/read-event-types:
    get:
      tags: [Events]
      summary: Alle bisher geschriebenen Event-Typen auflisten
      description: NDJSON, ein `{type,count}`-Objekt pro Zeile (alphabetisch).
      responses:
        "200":
          description: Event-Typen als NDJSON
          content:
            application/x-ndjson:
              schema:
                type: string
                description: NDJSON von TypeInfo-Objekten
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/register-event-schema:
    post:
      tags: [Events]
      summary: JSON Schema fĂĽr einen Event-Typ registrieren
      description: |
        Registriert ein JSON Schema fĂĽr `type`. Danach wird `data` aller Events
        dieses Typs beim Schreiben validiert. Schemas sind unverĂ¤nderlich
        (erneut â†’ 409); die Registrierung gelingt nur, wenn bereits gespeicherte
        Events des Typs konform sind (sonst 400).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, schema]
              properties:
                type: { type: string, example: "io.example.order-placed" }
                schema:
                  type: object
                  description: Ein JSON Schema
      responses:
        "200": { description: Registriert }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: FĂĽr diesen Typ existiert bereits ein Schema
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/read-event-schema:
    get:
      tags: [Events]
      summary: Registriertes Schema eines Typs lesen
      parameters:
        - name: type
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Das registrierte Schema
          content:
            application/json:
              schema:
                type: object
                properties:
                  type: { type: string }
                  schema: { type: object }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Kein Schema fĂĽr diesen Typ
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /api/v1/keys:
    post:
      tags: [Admin]
      summary: Neuen API-Key anlegen (Scope admin)
      description: |
        Legt einen benannten SchlĂĽssel mit Scopes an und antwortet **einmalig**
        mit dem vollstĂ¤ndigen Klartextwert `kid.secret`. Der Wert ist danach nicht
        mehr abrufbar (nur sein SHA-256-Hash wird gespeichert).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name: { type: string, example: "ci-writer" }
                scopes:
                  type: array
                  items: { type: string, enum: [read, write, admin] }
                  example: ["read", "write"]
      responses:
        "201":
          description: Angelegt â€” Geheimnis nur jetzt sichtbar
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CreatedKey" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }
    get:
      tags: [Admin]
      summary: API-Keys auflisten (Scope admin)
      description: |
        Liefert alle SchlĂĽssel ohne Geheimnisse/Hashes sowie die Anzahl aktiver
        Admin-Keys. Ist nur noch ein Admin-Key aktiv, enthĂ¤lt die Antwort eine
        `warning` (Self-Lockout-Schutz, kein harter Block).
      responses:
        "200":
          description: Liste der SchlĂĽssel
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items: { $ref: "#/components/schemas/KeyView" }
                  activeAdminKeys: { type: integer, example: 2 }
                  warning: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/keys/{kid}/revoke:
    post:
      tags: [Admin]
      summary: API-Key widerrufen (Scope admin)
      description: |
        Setzt den Status auf `revoked` (kein LĂ¶schen â€” die kid-Zuordnung bleibt
        fĂĽrs Audit erhalten). Ein Admin darf sich selbst widerrufen; bliebe danach
        kein aktiver Admin-Key ĂĽbrig, enthĂ¤lt die Antwort eine `warning`.
      parameters:
        - name: kid
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Widerrufen
          content:
            application/json:
              schema:
                type: object
                properties:
                  kid: { type: string, example: "kid_ci01" }
                  status: { type: string, example: "revoked" }
                  warning: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404":
          description: Unbekannter kid
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/public-key:
    get:
      tags: [Events]
      summary: Ă–ffentlicher SignaturschlĂĽssel
      description: Liefert den Ed25519-Public-Key (base64). 404, wenn Signieren inaktiv.
      responses:
        "200":
          description: Ă–ffentlicher SchlĂĽssel
          content:
            application/json:
              schema:
                type: object
                properties:
                  algorithm: { type: string, example: "ed25519" }
                  publicKey: { type: string, description: "base64" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Signieren ist nicht aktiviert
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }

  /api/v1/run-query:
    post:
      tags: [Events]
      summary: Events per CEL-PrĂ¤dikat abfragen
      description: |
        Liest die Events eines Scopes (`subject`, ggf. `recursive`, `lowerBound`/
        `upperBound`) und filtert sie mit dem CEL-Ausdruck `where` ĂĽber die
        Variable `event` (z. B. `event.type == 'placed' && event.data.amount > 100`).
        Leeres `where` = alle im Scope. Ergebnis als NDJSON.

        Optionale **Projektion** via `select`: eine Liste punktseparierter
        Feldpfade (z. B. `["id", "data.title"]`). Ist `select` gesetzt, enthĂ¤lt
        jede Zeile nur die gewĂ¤hlten Felder; die Verschachtelung bleibt erhalten
        (`data.title` â†’ `{"data":{"title":...}}`). Fehlende Felder werden
        ausgelassen (kein `null`). Array-Indizierung wird nicht unterstĂĽtzt. Ohne
        `select` wird das volle Event zurĂĽckgegeben.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject]
              properties:
                subject: { type: string, example: "/orders" }
                recursive: { type: boolean, default: false }
                where: { type: string, description: "CEL-PrĂ¤dikat (bool); leer = alle" }
                lowerBound: { type: string }
                upperBound: { type: string }
                limit: { type: integer, description: "max. Treffer; 0 = unbegrenzt" }
                select:
                  type: array
                  items: { type: string }
                  description: "Feldpfade fĂĽr Projektion; leer = volles Event"
                  example: ["id", "subject", "data.amount"]
            examples:
              filter:
                value:
                  subject: "/orders"
                  recursive: true
                  where: "event.type == 'placed' && has(event.data.amount) && event.data.amount > 100"
              projektion:
                value:
                  subject: "/orders"
                  recursive: true
                  select: ["id", "subject", "data.amount"]
      responses:
        "200":
          description: |
            Passende Events als NDJSON. Bei gesetztem `select` enthĂ¤lt jede Zeile
            nur die projizierten Felder statt des vollen Events.
          content:
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/EventStream" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/verify:
    get:
      tags: [Events]
      summary: IntegritĂ¤t der Hash-Kette prĂĽfen (Tamper-Evidence)
      description: |
        Rechnet die gesamte SHA-256-Hash-Kette nach. `ok=true` beweist, dass
        kein historisches Event nachtrĂ¤glich verĂ¤ndert wurde. Eine erkannte
        Manipulation ergibt HTTP 200 mit `ok=false` und `brokenAt`.
      responses:
        "200":
          description: PrĂĽfergebnis
          content:
            application/json:
              schema: { $ref: "#/components/schemas/VerifyResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/event-stats:
    get:
      tags: [Events]
      summary: Eventmengen ĂĽber die Zeit (gesamte Historie)
      description: |
        Liefert ein Histogramm der Events ĂĽber die Zeit (nach Event-Zeit):
        Startzeitpunkt (= Zeit des ersten Events), Bucket-Breite (Sekunden) und
        die Bucket-ZĂ¤hler. Das Histogramm wird beim Serverstart aus der gesamten
        Historie aufgebaut und danach bei jedem Write fortgeschrieben. Damit lĂ¤sst
        sich die Eventmenge ĂĽber die Zeitachse darstellen, ohne die Historie zu
        streamen. Die Bucket-Breite ist adaptiv (verdoppelt sich bei langer
        Zeitspanne), die Anzahl der Buckets ist beschrĂ¤nkt.

        Mit `by=source` wird zusĂ¤tzlich nach CloudEvents-`source` aufgeschlĂĽsselt:
        die Antwort enthĂ¤lt dann `sources` (eine zu `counts` ausgerichtete Bucket-
        Reihe je Source). Die Zahl getrennt gefĂĽhrter Sources ist beschrĂ¤nkt;
        weitere werden in der Serie `andere` zusammengefasst.
      parameters:
        - name: by
          in: query
          required: false
          description: "`source` schlĂĽsselt das Histogramm zusĂ¤tzlich nach CloudEvents-`source` auf."
          schema: { type: string, enum: [source] }
          example: source
      responses:
        "200":
          description: Histogramm der Eventmengen
          content:
            application/json:
              schema:
                type: object
                properties:
                  start: { type: string, format: date-time, description: Beginn von Bucket 0 (Serverstart) }
                  bucketSeconds: { type: number, description: Bucket-Breite in Sekunden }
                  counts:
                    type: array
                    items: { type: integer, format: int64 }
                    description: Events je Bucket, ab `start` in Schritten von `bucketSeconds`
                  sources:
                    type: object
                    description: Nur bei `by=source` â€” Bucket-Reihe je Source (zu `counts` ausgerichtet); Ăśberlauf in `andere`.
                    additionalProperties:
                      type: array
                      items: { type: integer, format: int64 }
                  total: { type: integer, format: int64 }
                  serverTime: { type: string, format: date-time }
              example:
                start: "2026-06-13T18:00:00Z"
                bucketSeconds: 1
                counts: [0, 3, 1, 0, 5]
                total: 9
                serverTime: "2026-06-13T18:00:05Z"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/v1/events/{subject}:
    get:
      tags: [Events]
      summary: Komfort-Leseroute (Subject im Pfad)
      description: |
        Liest Events, deren Subject dem URL-Pfad entspricht. Eltern-Pfade
        liefern dank `recursive` (Default `true`) automatisch alles darunter.
        Mit `watch=true` bleibt die Verbindung wie bei observe-events offen.
        `GET /api/v1/events` (ohne Subject) liefert die Wurzel (alle Events).
      parameters:
        - name: subject
          in: path
          required: true
          description: Subject-Pfad, z. B. `books/42` (fĂĽhrt zu Subject `/books/42`)
          schema: { type: string }
          example: "books/42"
        - name: recursive
          in: query
          schema: { type: boolean, default: true }
        - name: lowerBound
          in: query
          description: Inklusive untere Event-ID-Grenze
          schema: { type: string }
        - name: upperBound
          in: query
          description: Inklusive obere Event-ID-Grenze
          schema: { type: string }
        - name: type
          in: query
          description: Filter nach Event-Typ (wiederholbar)
          schema: { type: array, items: { type: string } }
        - name: watch
          in: query
          description: Verbindung offen halten und live nachliefern
          schema: { type: boolean, default: false }
      responses:
        "200":
          description: Passende Events als NDJSON
          content:
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/EventStream" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/dev/reset-database:
    post:
      tags: [Dev]
      summary: Datenbank zurĂĽcksetzen (Tabula rasa) â€” nur im Dev-Mode
      description: |
        **Destruktiv und unwiderruflich.** LĂ¶scht alle Events, Indizes,
        Typ-ZĂ¤hler und Schemas; die Event-Sequenz beginnt wieder bei `#0`.

        Diese Route existiert **nur**, wenn der Server im Dev-Mode lĂ¤uft
        (Umgebungsvariable `CLIO_DEV_MODE`, ADR-022). Ohne Dev-Mode ist sie
        nicht registriert und antwortet mit `404`. Gedacht ausschlieĂźlich fĂĽr
        Entwicklungs- und Demoumgebungen â€” im Produktivbetrieb widerspricht das
        LĂ¶schen der UnverĂ¤nderlichkeit (vgl. ADR-015).

        Als Nebeneffekt **Ă¶ffnet der Reset das Bulk-Import-Fenster wieder**
        (`bulkImportOpen=true`): nach einer â€žSupernova" darf erneut per
        `POST /api/v1/dev/bulk-import-events` in groĂźen Mengen geladen werden.
      responses:
        "200":
          description: Datenbank zurĂĽckgesetzt
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "tabula-rasa" }
                  deletedEvents: { type: integer, format: int64, example: 42 }
                  resetAt: { type: string, format: date-time }
                  bulkImportOpen:
                    type: boolean
                    example: true
                    description: Nach dem Reset ist das Bulk-Import-Fenster wieder offen.
                  message: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Dev-Mode nicht aktiv â€” Route nicht verfĂĽgbar
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/dev/bulk-import-events:
    post:
      tags: [Dev]
      summary: Bulk-Import groĂźer Eventmengen â€” nur im offenen Startfenster (Dev-Mode)
      description: |
        Schreibt Events mit derselben Semantik wie `POST /api/v1/write-events`
        (atomar, Preconditions mĂ¶glich), ist aber **nur im Bulk-Import-Fenster**
        erlaubt. Gedacht fĂĽr einmaliges Seeding/Migration direkt nach dem Start
        oder nach einer â€žSupernova" (`reset-database`).

        Das Fenster ist bei Server-Start (im Dev-Mode) offen, kann per
        `POST /api/v1/dev/close-bulk-import` geschlossen werden und wird durch
        `POST /api/v1/dev/reset-database` wieder geĂ¶ffnet. Ist das Fenster
        geschlossen, antwortet die Route mit `409` â€” so werden versehentliche
        High-Volume-Importe im laufenden Betrieb verhindert.

        Diese Route existiert **nur** im Dev-Mode (`CLIO_DEV_MODE`, ADR-022);
        ohne Dev-Mode ist sie nicht registriert (`404`).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/WriteEventsRequest" }
            examples:
              massenimport:
                value:
                  events:
                    - source: "migration"
                      subject: "/books/42"
                      type: "io.example.library.book-acquired"
                      data: { title: "Dune", author: "Herbert" }
                    - source: "migration"
                      subject: "/books/43"
                      type: "io.example.library.book-acquired"
                      data: { title: "Solaris", author: "Lem" }
      responses:
        "200":
          description: Geschriebene Events als NDJSON
          content:
            application/x-ndjson:
              schema: { $ref: "#/components/schemas/EventStream" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409":
          description: |
            Bulk-Import-Fenster ist geschlossen â€” erst `dev/reset-database`
            ausfĂĽhren â€” oder eine Precondition war nicht erfĂĽllt.
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/ProblemDetails" }
        "404":
          description: Dev-Mode nicht aktiv â€” Route nicht verfĂĽgbar
        "500": { $ref: "#/components/responses/InternalError" }

  /api/v1/dev/close-bulk-import:
    post:
      tags: [Dev]
      summary: Bulk-Import-Fenster explizit schlieĂźen â€” nur im Dev-Mode
      description: |
        SchlieĂźt das Bulk-Import-Fenster. Danach liefert
        `POST /api/v1/dev/bulk-import-events` ein `409`, bis ein
        `POST /api/v1/dev/reset-database` es wieder Ă¶ffnet. Idempotent â€” ein
        bereits geschlossenes Fenster bleibt geschlossen.

        Diese Route existiert **nur** im Dev-Mode (`CLIO_DEV_MODE`, ADR-022);
        ohne Dev-Mode ist sie nicht registriert (`404`).
      responses:
        "200":
          description: Fenster geschlossen
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, example: "closed" }
                  bulkImportOpen: { type: boolean, example: false }
                  closedAt: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404":
          description: Dev-Mode nicht aktiv â€” Route nicht verfĂĽgbar
        "500": { $ref: "#/components/responses/InternalError" }


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: |
        Benannter API-Key im Format `kid.secret` (ADR-025), z. B.
        `Authorization: Bearer kid_ci01.W8xqâ€¦`. Jeder Key trĂ¤gt Scopes
        (read/write/admin); lesende Routen verlangen `read`, schreibende
        `write`, die SchlĂĽsselverwaltung `admin`. Fehlender/ungĂĽltiger Key â†’ 401,
        gĂĽltiger Key ohne passenden Scope â†’ 403.

  responses:
    BadRequest:
      description: UngĂĽltige Anfrage
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    Unauthorized:
      description: Fehlender/ungĂĽltiger SchlĂĽssel oder widerrufen
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    Forbidden:
      description: GĂĽltig authentifiziert, aber der SchlĂĽssel trĂ¤gt den nĂ¶tigen Scope nicht
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }
    InternalError:
      description: Interner Fehler
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/ProblemDetails" }

  schemas:
    Status:
      type: object
      properties:
        status: { type: string, example: "ok" }
    ProblemDetails:
      type: object
      description: |
        Fehler-Body nach RFC 7807 (application/problem+json). `type` ist
        generisch ("about:blank"), `title` der HTTP-Statustext, `detail` die
        konkrete Meldung. Fehlerantworten tragen zudem `Cache-Control: no-store`.
      properties:
        type: { type: string, example: "about:blank" }
        title: { type: string, example: "Bad Request" }
        status: { type: integer, example: 400 }
        detail: { type: string, example: "subject muss mit \"/\" beginnen" }
    KeyView:
      type: object
      description: |
        Ă–ffentliche Sicht auf einen API-Key (ADR-025) â€” ohne Geheimnis/Hash.
      properties:
        kid: { type: string, example: "kid_ci01" }
        name: { type: string, example: "ci-writer" }
        scopes:
          type: array
          items: { type: string, enum: [read, write, admin] }
        status: { type: string, enum: [active, revoked], example: "active" }
        createdAt: { type: string, format: date-time }
        revokedAt: { type: string, format: date-time, nullable: true }
    CreatedKey:
      type: object
      description: |
        Antwort auf `POST /api/v1/keys`. `secret` ist der vollstĂ¤ndige
        Leitungswert `kid.secret` und wird **nur jetzt** ausgeliefert.
      properties:
        kid: { type: string, example: "kid_ci01" }
        name: { type: string, example: "ci-writer" }
        scopes:
          type: array
          items: { type: string, enum: [read, write, admin] }
        status: { type: string, example: "active" }
        createdAt: { type: string, format: date-time }
        secret: { type: string, example: "kid_ci01.W8xqT2vK9pL4mN6rS1dF3hJ5" }
        warning: { type: string }
    SubjectTreeNode:
      type: object
      description: |
        Knoten im Subject-Baum (`GET /api/v1/read-subjects?tree=true`). `count`
        sind die Events exakt auf diesem Subject (0 fĂĽr reine Zwischenknoten),
        `total` die aggregierte Anzahl im Teilbaum. `children` ist nie null.
      properties:
        subject: { type: string, example: "/books" }
        count: { type: integer, example: 0 }
        total: { type: integer, example: 3 }
        children:
          type: array
          items: { $ref: "#/components/schemas/SubjectTreeNode" }
    EventCandidate:
      type: object
      required: [source, subject, type]
      properties:
        source:
          type: string
          description: Herkunft (URI-artig)
          example: "https://library.example.io"
        subject:
          type: string
          description: Stream-Pfad, beginnt mit "/"
          example: "/books/42"
        type:
          type: string
          example: "io.example.library.book-acquired"
        data:
          description: Beliebige JSON-Nutzdaten (optional)
          nullable: true
    Event:
      type: object
      description: |
        Gespeichertes, unverĂ¤nderliches Event (CloudEvents). Ăśber
        `predecessorhash`/`hash` bilden die Events eine fortlaufende SHA-256-
        Hash-Kette (Tamper-Evidence) â€” siehe `GET /api/v1/verify`.
      properties:
        specversion: { type: string, example: "1.0" }
        id: { type: string, description: "global monoton steigend", example: "42" }
        time: { type: string, format: date-time }
        source: { type: string }
        subject: { type: string }
        type: { type: string }
        datacontenttype: { type: string, example: "application/json" }
        data: { nullable: true }
        clioauthkid:
          type: string
          description: |
            Optionale CloudEvents-Extension: kid des authentifizierten SchlĂĽssels,
            der das Event geschrieben hat (Urheberschaft, ADR-025). Nur vorhanden,
            wenn `CLIO_EVENT_AUTHORSHIP` aktiv war; geht dann in den Hash ein.
          example: "kid_ci01"
        predecessorhash:
          type: string
          description: SHA-256-Hash des VorgĂ¤ngers (Genesis = 64 Nullen)
        hash:
          type: string
          description: SHA-256-Hash dieses Events ĂĽber Inhalt + predecessorhash
        signature:
          type: string
          nullable: true
          description: Ed25519-Signatur ĂĽber den Hash (base64); null, wenn Signieren inaktiv
    TypeInfo:
      type: object
      properties:
        type: { type: string, example: "io.example.library.book-acquired" }
        count: { type: integer, description: "Anzahl Events dieses Typs" }
        hasSchema: { type: boolean, description: "true, wenn ein Schema registriert ist" }
    VerifyResult:
      type: object
      properties:
        ok: { type: boolean, description: "true, wenn die Hash-Kette intakt ist" }
        count: { type: integer, description: "Anzahl geprĂĽfter Events" }
        head: { type: string, description: "Hash des letzten Events" }
        brokenAt: { type: string, description: "Event-ID der ersten Bruchstelle (falls ok=false)" }
        reason: { type: string }
    EventStream:
      type: string
      description: |
        NDJSON: ein `Event`-JSON-Objekt pro Zeile (kein JSON-Array).
    Precondition:
      type: object
      required: [type, payload]
      description: |
        Optimistic Concurrency. Subject-Bedingungen (`isSubjectPristine`,
        `isSubjectOnEventId`) oder CEL-Abfrage-Bedingungen
        (`isQueryResultEmpty`/`isQueryResultNonEmpty`): erfĂĽllt, wenn eine CEL-
        Abfrage ĂĽber den Scope kein bzw. mindestens ein Treffer-Event liefert.
      properties:
        type:
          type: string
          enum: [isSubjectPristine, isSubjectOnEventId, isQueryResultEmpty, isQueryResultNonEmpty]
        payload:
          type: object
          properties:
            subject: { type: string, example: "/accounts/42" }
            eventId:
              type: string
              description: nur fĂĽr isSubjectOnEventId
              example: "7"
            recursive:
              type: boolean
              description: nur fĂĽr Query-Preconditions (Scope rekursiv)
            where:
              type: string
              description: nur fĂĽr Query-Preconditions (CEL-PrĂ¤dikat; leer = Scope-Existenz)
              example: "event.type == 'opened'"
    WriteEventsRequest:
      type: object
      required: [events]
      properties:
        events:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/EventCandidate" }
        preconditions:
          type: array
          items: { $ref: "#/components/schemas/Precondition" }
    ReadEventsRequest:
      type: object
      required: [subject]
      properties:
        subject: { type: string, example: "/books/42" }
        recursive: { type: boolean, default: false }
        lowerBound: { type: string, description: "inklusive untere Event-ID-Grenze" }
        upperBound: { type: string, description: "inklusive obere Event-ID-Grenze" }
        types:
          type: array
          items: { type: string }
          description: Filter nach Event-Typ
    ObserveEventsRequest:
      type: object
      required: [subject]
      properties:
        subject: { type: string, example: "/books" }
        recursive: { type: boolean, default: false }
        lowerBound: { type: string, description: "Reconnect ab dieser Event-ID" }
        types:
          type: array
          items: { type: string }
