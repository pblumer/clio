<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="clio">
  <defs>
    <linearGradient id="muse" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
  </defs>
  <!-- Kosmos-Kachel, abgestimmt auf das Dashboard-Theme -->
  <rect width="32" height="32" rx="7" fill="#05070f"/>
