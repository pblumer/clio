apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clio-data
  namespace: clio
spec:
  accessModes: ["ReadWriteOnce"] # genau ein Pod schreibt — passt zu Single-Instance
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: clio-backups
  namespace: clio
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 20Gi
